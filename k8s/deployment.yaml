apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-app-deployment
  labels:
    app: devops-exam
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-exam
  template:
    metadata:
      labels:
        app: devops-exam
    spec:
      containers:
      - name: devops-container
        image: YOUR_DOCKERHUB_USERNAME/devops-exam:FA23-BCS-148
        ports:
        - containerPort: 8080
        env:
        - name: MONGODB_URI
          value: "mongodb+srv://Zunair:Zunair@task-manager.hendyep.mongodb.net/?appName=Task-Manager"
